<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Forest — Portland</title>
  <meta name="description" content="Portland's living canopy. Ask anything about the trees of the City of Roses." />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="map"></div>

  <header class="topbar">
    <div class="brand">
      <div class="mark"></div>
      <div class="brand-text">
        <h1>Deep Forest</h1>
        <span class="sub">Portland's urban canopy</span>
      </div>
    </div>
    <div class="stats" id="stats">
      <span class="stat"><b id="visible-count">—</b><em>visible</em></span>
      <span class="stat"><b id="species-count">—</b><em>species</em></span>
    </div>
  </header>

  <aside class="panel" id="panel">
    <div class="panel-header">
      <h2>Ask the canopy</h2>
      <p>Try: "mature oaks in poor condition" · "heritage trees" · "native trees in Buckman"</p>
    </div>

    <div class="messages" id="messages">
      <div class="msg assistant">
        <div class="bubble">
          Hi — I'm your guide to Portland's trees. Ask me anything in plain English and I'll filter the map.
        </div>
      </div>
    </div>

    <form class="composer" id="composer">
      <input
        id="prompt"
        type="text"
        placeholder="Ask about Portland's trees…"
        autocomplete="off"
        required
      />
      <button type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </form>
  </aside>

  <div class="loader" id="loader">
    <div class="loader-inner">
      <div class="pulse"></div>
      <span>Loading the urban canopy…</span>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
